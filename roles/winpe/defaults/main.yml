winpe_curl_version: '8.18.0_4'
winpe_curl_directory: curl-{{ winpe_curl_version }}-win64-mingw
winpe_curl_download_url: https://curl.se/windows/dl-{{ winpe_curl_version }}/curl-{{ winpe_curl_version }}-win64-mingw.zip
winpe_temp_directory: '{{ ansible_env.TEMP }}'
winpe_smb_share: ''
winpe_destination_file_location: ''
winpe_drivers_url: ''

winpe_architectures:
  x86_64: amd64
  aarch64: arm64
  arm64: arm64

winpe_drivers:
  - name: apple_usb_ethernet
    url: '{{ winpe_drivers_url }}/AsixSetup64.exe'
    enable: true

winpe_unzip_executable: c:\Progra~1\7-Zip\7z.exe

winpe_cobbler_host: "{{ lookup('env', 'COBBLER_host') | urlsplit('hostname') }}"
winpe_cobbler_port: 8080

# Provisioning server type: 'cobbler' or 'foreman'
winpe_provisioning_server_type: foreman

# Foreman-specific settings
winpe_foreman_host: "{{ lookup('env', 'FOREMAN_HOST') | default('') }}"
winpe_foreman_port: 443
winpe_foreman_scheme: https
winpe_foreman_media_subdir: ''
# REMOVED: winpe_foreman_smb_media — no longer needed.
# Previously, the Windows media UNC path (\\host\share\isoname) had to be baked
# into the WinPE ISO at build time, requiring a new ISO for every new Windows ISO.
#
# NEW APPROACH (matches cobbler's dynamic script mechanism):
#   WinPE init.cmd downloads mountmedia.cmd from Foreman at boot time:
#     curl https://FOREMAN_HOST/unattended/script
#   Foreman renders the 'windows-mountmedia.cmd' script template (kind=script)
#   with the host's context — @host.medium.path (http://host/media/windows/isoname)
#   is converted to \\host\media\windows\isoname at render time.
#   This is the exact Foreman equivalent of cobbler's Cheetah-rendered mountmedia.cmd:
#     curl /cblr/svc/op/script/system/<sysname>/?script=mountmedia.cmd
#
# WHAT IS STILL BAKED INTO THE WINPE ISO:
#   winpe_foreman_host  — the Foreman server IP/hostname (changes only if you rebuild Foreman)
#   winpe_foreman_port  — default 443
#   winpe_foreman_scheme — default https
#
# The WinPE ISO is now OS-version-agnostic — one ISO per Foreman server handles
# all Windows versions (2019, 2022, 11, etc.) without rebuilding.
# When true, WinPE writes SetupComplete.cmd to the target Windows partition so
# the Foreman built callback fires AFTER full Windows installation (before first
# logon). setup.exe is invoked with /noreboot so WinPE can write the script
# before rebooting into Windows setup phase 2+.
winpe_foreman_setupcomplete_in_winpe: true
winpe_foreman_built_callback_retries: 10
winpe_foreman_built_callback_retry_delay_sec: 15

# When true, pass /emsport:COM1 /emsbaudrate:115200 to setup.exe.
# Disable (false) to avoid the Windows Boot Manager text-mode menu that appears
# when EMS is enabled (requires manual "Windows Server [EMS Enabled]" selection).
winpe_foreman_ems_enabled: false

# When true, add 'bcdedit /set {current} bootems no' to SetupComplete.cmd as a
# safety net in case EMS ended up in BCD (e.g. from a previous install attempt).
winpe_foreman_disable_ems_in_bcd: true

winpe_name: winpe_{{ winpe_cobbler_host }}_{{ winpe_arch }}

winpe_enable_script_debug: false
winpe_enable_powershell_modules: false
winpe_enable_autostart: true
winpe_load_drivers: true

winpe_replace_wallpaper: false

